# Serves the psa SPA and proxies /api to the api service. The trailing slash on
# proxy_pass strips the /api prefix (so /api/auth/login -> api:3000/auth/login).
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA history-mode fallback: unknown paths render index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    proxy_pass http://api:3000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
