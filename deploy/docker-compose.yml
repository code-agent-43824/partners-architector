# Application/runtime stack for psa (self-hosted, single host).
#
# This is product/runtime configuration, NOT a deployment pipeline.
# Production deploys remain manual and are performed only by Watson — see
# AGENTS.md. Never commit a real deploy/.env (it is git-ignored).
#
# Services: `db` (PostgreSQL 16 + pgvector), `api` (NestJS), `web` (SPA via
# nginx, which proxies /api to the api). A TLS reverse proxy (Caddy/nginx) is
# added for production (spec §7.6); over plain HTTP set AUTH_COOKIE_SECURE=false.
#
# Usage, from the repository root (COMPOSE = docker compose --env-file deploy/.env
# -f deploy/docker-compose.yml):
#   cp deploy/.env.example deploy/.env     # set POSTGRES_PASSWORD and AUTH_JWT_SECRET
#   $COMPOSE up -d --build                 # build + start db, api (auto-migrates), web
#   $COMPOSE exec api pnpm --filter @psa/api db:seed     # load the 30 blocks (once)
#   # open http://localhost:${WEB_PORT:-8080}
#   $COMPOSE down                          # (add -v to drop the database volume)

name: psa

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-psa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in deploy/.env}
      POSTGRES_DB: ${POSTGRES_DB:-psa}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-psa} -d ${POSTGRES_DB:-psa}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api: # step 0.3 — NestJS API
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: '3000'
      DATABASE_URL: postgresql://${POSTGRES_USER:-psa}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-psa}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:?set AUTH_JWT_SECRET in deploy/.env}
      AUTH_TOKEN_TTL: ${AUTH_TOKEN_TTL:-7d}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-true}
      AUTH_ADMIN_EMAIL: ${AUTH_ADMIN_EMAIL:-}
      AUTH_ADMIN_PASSWORD: ${AUTH_ADMIN_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '${API_PORT:-3000}:3000'
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://127.0.0.1:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  web: # SPA served by nginx; proxies /api to the api service
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '${WEB_PORT:-8080}:80'

volumes:
  pgdata:
